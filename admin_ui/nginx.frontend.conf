# Admin UI — 정적 SPA 서빙 + 백엔드 API 내부 프록시.
#
# `/api/*` 로 온 요청만 접두사를 벗기고 백엔드로 프록시한다. 브라우저가 항상
# 이 컨테이너와 같은 origin(zrok 터널 주소든 trd.puwa.net이든 localhost:3000
# 이든)으로만 호출하게 만들어서 CORS/mixed-content 문제 자체가 생기지 않게
# 하는 게 목적이다.
#
# 경로 목록을 직접 나열하지 않고 `/api` 접두사 하나로 판단하는 이유: React
# Router의 클라이언트 라우트(`/orders`, `/accounts`, `/reconciliation`,
# `/agent-runs` 등, src/App.tsx)가 백엔드 API 라우터 prefix와 이름이 그대로
# 겹친다 — 경로 나열 방식이면 `/orders` 페이지 새로고침이 SPA 대신 API 응답을
# 받아버리는 충돌이 생긴다(실측 확인됨). `/api`로 항상 명확히 구분한다.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://agent_trading-api-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 실시간 현재가 화면의 SSE 스트림(GET /realtime-quotes/stream)이
        # nginx 버퍼링 때문에 지연되지 않도록 즉시 flush한다.
        proxy_buffering off;
    }

    # BrowserRouter가 실제 경로(/orders 등)를 클라이언트 라우팅에도 쓰므로,
    # /api가 아닌 나머지 경로는 전부 index.html로 넘긴다(예전 백엔드의
    # _SPAStaticFiles와 동일한 역할).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# =============================================================================
# Agent Trading System — Local Development Services
# =============================================================================
# Minimal setup: PostgreSQL + Python app container + FastAPI inspection API.
# No Redis, observability, or CI/CD infrastructure.
#
# Services:
#   app  — Dev shell container (pytest, migration, manual scripts)
#   api  — FastAPI inspection API server (Postgres mode, port 8000)
#
# Usage:
#   docker compose up -d            # Start all services
#   docker compose up -d db api     # Start DB + API only (no dev shell)
#   docker compose exec app bash    # Open a shell in the dev container
#   docker compose down             # Stop all services
# =============================================================================

version: '3.8'

services:
  # ---- Python Application (Development Shell) -----------------------------
  app:
    build: .
#    depends_on:
#      db:
#        condition: service_healthy
    environment:
      TZ: "Asia/Seoul"
      DATABASE_HOST: trading_db
      DATABASE_PORT: "5432"
      DATABASE_NAME: "${DATABASE_NAME:-trading}"
      DATABASE_USER: "${DATABASE_USER:-trading}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-trading}"
      DATABASE_SCHEMA: "${DATABASE_SCHEMA:-trading}"
      APP_ENV: "${APP_ENV:-paper}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Seoul}"
      # KIS env — preferred names (한국투자증권 actual standard)
      KIS_ENV: "${KIS_ENV:-paper}"
      KIS_APP_KEY: "${KIS_APP_KEY:-}"
      KIS_APP_SECRET: "${KIS_APP_SECRET:-}"
      KIS_ACCOUNT_NO: "${KIS_ACCOUNT_NO:-}"
      KIS_BASE_URL: "${KIS_BASE_URL:-}"
      KIS_WS_URL: "${KIS_WS_URL:-}"
      KIS_ACCOUNT_PRODUCT_CODE: "${KIS_ACCOUNT_PRODUCT_CODE:-01}"
      # REST rate limit safety budget baseline (KIS notice 2026-04-20: 실전 18 rps)
      KIS_REAL_REST_RPS: "${KIS_REAL_REST_RPS:-18}"
      KIS_PAPER_REST_RPS: "${KIS_PAPER_REST_RPS:-1}"
      # Dev token cache — share host cache to avoid EGW00133 rate limit
      KIS_DEV_TOKEN_CACHE_ENABLED: "true"
      KIS_DEV_TOKEN_CACHE_PATH: ".cache/kis_token.json"
      KIS_SHARED_BUDGET_FILE: "${KIS_SHARED_BUDGET_FILE:-.cache/kis_paper_global_budget.json}"
      # Legacy fallback names (still supported)
      KIS_API_KEY: "${KIS_API_KEY:-}"
      KIS_API_SECRET: "${KIS_API_SECRET:-}"
      KIS_ACCOUNT_NUMBER: "${KIS_ACCOUNT_NUMBER:-}"
      # P1: Live-info client (076 holiday / market session gate) — completely separate
      # from paper/live order credentials. Read-only market info only.
      KIS_LIVE_INFO_ENABLED: "${KIS_LIVE_INFO_ENABLED:-false}"
      KIS_LIVE_INFO_APP_KEY: "${KIS_LIVE_INFO_APP_KEY:-}"
      KIS_LIVE_INFO_APP_SECRET: "${KIS_LIVE_INFO_APP_SECRET:-}"
      KIS_LIVE_INFO_BASE_URL: "${KIS_LIVE_INFO_BASE_URL:-}"
      KIS_LIVE_INFO_WS_URL: "${KIS_LIVE_INFO_WS_URL:-}"
      # P2: Live-info token cache (WebSocket approval key persistence)
      KIS_LIVE_TOKEN_CACHE_ENABLED: "${KIS_LIVE_TOKEN_CACHE_ENABLED:-true}"
      KIS_LIVE_TOKEN_CACHE_PATH: "${KIS_LIVE_TOKEN_CACHE_PATH:-.cache/kis_live_token.json}"
      # P3: Seeded News — NAVER Search API (news candidate 수집용)
      NAVER_CLIENT_ID: "${NAVER_CLIENT_ID:-}"
      NAVER_CLIENT_SECRET: "${NAVER_CLIENT_SECRET:-}"
      SEEDED_NEWS_ENABLED: "${SEEDED_NEWS_ENABLED:-0}"
      LLM_PROVIDER: "${LLM_PROVIDER:-deepseek}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL_ID: "${DEEPSEEK_MODEL_ID:-deepseek-chat}"
      DEEPSEEK_TIMEOUT_SECONDS: "${DEEPSEEK_TIMEOUT_SECONDS:-30}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL_ID: "${OPENAI_MODEL_ID:-gpt-4o}"
      OPENAI_TIMEOUT_SECONDS: "${OPENAI_TIMEOUT_SECONDS:-30}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_BASE_URL: "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}"
      GEMINI_MODEL_ID: "${GEMINI_MODEL_ID:-gemini-3.5-flash}"
      GEMINI_TIMEOUT_SECONDS: "${GEMINI_TIMEOUT_SECONDS:-30}"
      OPENDART_API_KEY: "${OPENDART_API_KEY:-}"
    volumes:
      - ./src:/app/src
      - ./db:/app/db
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./pyproject.toml:/app/pyproject.toml
      # Share KIS dev token cache to avoid 1-per-minute oauth2 rate limit
      - ./.cache:/app/.cache
      - ./data:/app/data
      - ./tmp:/app/tmp
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    # Keep the container alive for interactive commands
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
    networks:
      - shared_net  # 추가됨

  # ---- FastAPI Inspection API ----------------------------------------------
  # Runs the read-only inspection API in Postgres-backed mode.
  # Uses uvicorn --factory to call create_app_from_env(), which reads
  # API_RUNTIME_MODE from the environment.
  api:
    build: .
#    depends_on:
#      db:
#        condition: service_healthy
    environment:
      TZ: "Asia/Seoul"
      DATABASE_HOST: trading_db
      DATABASE_PORT: "5432"
      DATABASE_NAME: "${DATABASE_NAME:-trading}"
      DATABASE_USER: "${DATABASE_USER:-trading}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-trading}"
      DATABASE_SCHEMA: "${DATABASE_SCHEMA:-trading}"
      API_RUNTIME_MODE: "${API_RUNTIME_MODE:-postgres}"
      APP_ENV: "${APP_ENV:-paper}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Seoul}"
      # KIS env — preferred names (한국투자증권 actual standard)
      KIS_ENV: "${KIS_ENV:-paper}"
      KIS_APP_KEY: "${KIS_APP_KEY:-}"
      KIS_APP_SECRET: "${KIS_APP_SECRET:-}"
      KIS_ACCOUNT_NO: "${KIS_ACCOUNT_NO:-}"
      KIS_BASE_URL: "${KIS_BASE_URL:-}"
      KIS_WS_URL: "${KIS_WS_URL:-}"
      KIS_ACCOUNT_PRODUCT_CODE: "${KIS_ACCOUNT_PRODUCT_CODE:-01}"
      # REST rate limit safety budget baseline
      KIS_REAL_REST_RPS: "${KIS_REAL_REST_RPS:-15}"
      KIS_PAPER_REST_RPS: "${KIS_PAPER_REST_RPS:-1}"
      # Dev token cache — share host cache to avoid EGW00133 rate limit
      KIS_DEV_TOKEN_CACHE_ENABLED: "true"
      KIS_DEV_TOKEN_CACHE_PATH: ".cache/kis_token.json"
      KIS_SHARED_BUDGET_FILE: "${KIS_SHARED_BUDGET_FILE:-.cache/kis_paper_global_budget.json}"
      # Legacy fallback names (still supported)
      KIS_API_KEY: "${KIS_API_KEY:-}"
      KIS_API_SECRET: "${KIS_API_SECRET:-}"
      KIS_ACCOUNT_NUMBER: "${KIS_ACCOUNT_NUMBER:-}"
      # P1: Live-info client (076 holiday / market session gate) — completely separate
      KIS_LIVE_INFO_ENABLED: "${KIS_LIVE_INFO_ENABLED:-false}"
      KIS_LIVE_INFO_APP_KEY: "${KIS_LIVE_INFO_APP_KEY:-}"
      KIS_LIVE_INFO_APP_SECRET: "${KIS_LIVE_INFO_APP_SECRET:-}"
      KIS_LIVE_INFO_BASE_URL: "${KIS_LIVE_INFO_BASE_URL:-}"
      KIS_LIVE_INFO_WS_URL: "${KIS_LIVE_INFO_WS_URL:-}"
      # P2: Live-info token cache (WebSocket approval key persistence)
      KIS_LIVE_TOKEN_CACHE_ENABLED: "${KIS_LIVE_TOKEN_CACHE_ENABLED:-true}"
      KIS_LIVE_TOKEN_CACHE_PATH: "${KIS_LIVE_TOKEN_CACHE_PATH:-.cache/kis_live_token.json}"
      # Realtime-quote screen client (Admin UI "실시간 현재가") — completely separate
      # Live account/appkey from the trading account and KIS_LIVE_INFO_*.
      # This connection lives ONLY in the `api` process — never add these to
      # ops-scheduler. Empty appkey/appsecret → mock (in-memory) source.
      KIS_REALTIME_QUOTE_APP_KEY: "${KIS_REALTIME_QUOTE_APP_KEY:-}"
      KIS_REALTIME_QUOTE_APP_SECRET: "${KIS_REALTIME_QUOTE_APP_SECRET:-}"
      KIS_REALTIME_QUOTE_BASE_URL: "${KIS_REALTIME_QUOTE_BASE_URL:-https://openapi.koreainvestment.com:9443}"
      KIS_REALTIME_QUOTE_WS_URL: "${KIS_REALTIME_QUOTE_WS_URL:-ws://ops.koreainvestment.com:21000}"
      KIS_REALTIME_QUOTE_APPROVAL_CACHE_PATH: "${KIS_REALTIME_QUOTE_APPROVAL_CACHE_PATH:-.cache/kis_realtime_quote_approval_key.json}"
      LLM_PROVIDER: "${LLM_PROVIDER:-deepseek}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL_ID: "${DEEPSEEK_MODEL_ID:-deepseek-chat}"
      DEEPSEEK_TIMEOUT_SECONDS: "${DEEPSEEK_TIMEOUT_SECONDS:-30}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL_ID: "${OPENAI_MODEL_ID:-gpt-4o}"
      OPENAI_TIMEOUT_SECONDS: "${OPENAI_TIMEOUT_SECONDS:-30}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_BASE_URL: "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}"
      GEMINI_MODEL_ID: "${GEMINI_MODEL_ID:-gemini-3.5-flash}"
      GEMINI_TIMEOUT_SECONDS: "${GEMINI_TIMEOUT_SECONDS:-30}"
      OPENDART_API_KEY: "${OPENDART_API_KEY:-}"
      INSPECTION_API_TOKEN: "${INSPECTION_API_TOKEN:-}"
    ports:
      - "8000:8000"
    volumes:
      - ./admin_ui/dist:/app/admin_ui/dist
      # Share KIS dev token cache to avoid 1-per-minute oauth2 rate limit
      - ./.cache:/app/.cache
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    command:
      - sh
      - -c
      - "python3 -m agent_trading.db.migrations.run && exec uvicorn agent_trading.api.app:create_app_from_env --factory --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - shared_net  # 추가됨

  # ---- Operations Scheduler --------------------------------------------------
  # Primary orchestration service for the trading day.
  # Runs run_ops_scheduler.py as a long-lived container with
  # PostgreSQL advisory lock for duplicate execution prevention.
  ops-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent_trading-app:latest
    container_name: agent_trading-ops-scheduler
    command:
      - "python3"
      - "/app/scripts/run_ops_scheduler.py"
      - "--max-general-buy-submit-per-day"
      - "${SCHEDULER_MAX_GENERAL_BUY_SUBMIT_PER_DAY:-6}"
    restart: unless-stopped
#    depends_on:
#      db:
#        condition: service_healthy
    environment:
      TZ: "Asia/Seoul"
      PYTHONPATH: "/app/src:/app/scripts"
      # DB — DATABASE_URL is used by scheduler for asyncpg direct connections
      DATABASE_URL: "postgresql://${DATABASE_USER:-trading}:${DATABASE_PASSWORD:-trading}@trading_db:5432/${DATABASE_NAME:-trading}"
      DB_POOL_MIN: "${DB_POOL_MIN:-2}"
      DB_POOL_MAX: "${DB_POOL_MAX:-10}"
      # DB legacy names (fallback for _build_dsn)
      DATABASE_HOST: "trading_db"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "${DATABASE_NAME:-trading}"
      DATABASE_USER: "${DATABASE_USER:-trading}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-trading}"
      DATABASE_SCHEMA: "${DATABASE_SCHEMA:-trading}"
      # KIS env — preferred names (한국투자증권 actual standard)
      KIS_ENV: "${KIS_ENV:-paper}"
      KIS_APP_KEY: "${KIS_APP_KEY:-}"
      KIS_APP_SECRET: "${KIS_APP_SECRET:-}"
      KIS_ACCOUNT_NO: "${KIS_ACCOUNT_NO:-}"
      KIS_ACCOUNT_PRODUCT_CODE: "${KIS_ACCOUNT_PRODUCT_CODE:-01}"
      KIS_BASE_URL: "${KIS_BASE_URL:-}"
      KIS_WS_URL: "${KIS_WS_URL:-}"
      KIS_PAPER_REST_RPS: "${KIS_PAPER_REST_RPS:-1}"
      # Legacy fallback names (still supported)
      KIS_API_KEY: "${KIS_API_KEY:-}"
      KIS_API_SECRET: "${KIS_API_SECRET:-}"
      KIS_ACCOUNT_NUMBER: "${KIS_ACCOUNT_NUMBER:-}"
      KIS_DEV_TOKEN_CACHE_ENABLED: "${KIS_DEV_TOKEN_CACHE_ENABLED:-true}"
      KIS_DEV_TOKEN_CACHE_PATH: "${KIS_DEV_TOKEN_CACHE_PATH:-.cache/kis_token.json}"
      KIS_SHARED_BUDGET_FILE: "${KIS_SHARED_BUDGET_FILE:-.cache/kis_paper_global_budget.json}"
      # KIS Live Info (076/163)
      KIS_LIVE_INFO_ENABLED: "${KIS_LIVE_INFO_ENABLED:-false}"
      KIS_LIVE_INFO_APP_KEY: "${KIS_LIVE_INFO_APP_KEY:-}"
      KIS_LIVE_INFO_APP_SECRET: "${KIS_LIVE_INFO_APP_SECRET:-}"
      KIS_LIVE_INFO_BASE_URL: "${KIS_LIVE_INFO_BASE_URL}"
      KIS_LIVE_INFO_WS_URL: "${KIS_LIVE_INFO_WS_URL}"
      KIS_LIVE_TOKEN_CACHE_ENABLED: "${KIS_LIVE_TOKEN_CACHE_ENABLED:-true}"
      KIS_LIVE_TOKEN_CACHE_PATH: "${KIS_LIVE_TOKEN_CACHE_PATH:-.cache/kis_live_token.json}"
      # P3: Seeded News — NAVER Search API (news candidate 수집용)
      NAVER_CLIENT_ID: "${NAVER_CLIENT_ID:-}"
      NAVER_CLIENT_SECRET: "${NAVER_CLIENT_SECRET:-}"
      # LLM Provider (needed by decision_submit_gate subprocess)
      LLM_PROVIDER: "${LLM_PROVIDER:-deepseek}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL_ID: "${DEEPSEEK_MODEL_ID:-deepseek-chat}"
      DEEPSEEK_TIMEOUT_SECONDS: "${DEEPSEEK_TIMEOUT_SECONDS:-30}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL_ID: "${OPENAI_MODEL_ID:-gpt-4o}"
      OPENAI_TIMEOUT_SECONDS: "${OPENAI_TIMEOUT_SECONDS:-30}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_BASE_URL: "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}"
      GEMINI_MODEL_ID: "${GEMINI_MODEL_ID:-gemini-3.5-flash}"
      GEMINI_TIMEOUT_SECONDS: "${GEMINI_TIMEOUT_SECONDS:-30}"
      OPENDART_API_KEY: "${OPENDART_API_KEY:-}"
      DETERMINISTIC_TRIGGER_APPLY_CORE_RISK_OFF_TOPK: "${DETERMINISTIC_TRIGGER_APPLY_CORE_RISK_OFF_TOPK:-1}"
      # Scheduler Specific
      SCHEDULER_AFTER_HOURS_WINDOW: "${SCHEDULER_AFTER_HOURS_WINDOW:-3600}"
      SCHEDULER_INSTANCE_ID: "${SCHEDULER_INSTANCE_ID:-default}"
    volumes:
      - ./scripts:/app/scripts
      - ./src:/app/src
      - ./logs:/app/logs
      - ./.cache:/app/.cache
      - ./data:/app/data
      - ./tmp:/app/tmp
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          python3 -c "
          import asyncio;
          from agent_trading.db.connection import create_pool, DatabaseConfig;
          import os;
          from datetime import datetime, timezone;
          loop = asyncio.new_event_loop();
          pool = loop.run_until_complete(create_pool(DatabaseConfig(dsn=os.environ['DATABASE_URL'])));
          row = loop.run_until_complete(pool.fetchrow(
              'SELECT last_heartbeat_at, checked_at, is_trading_day, market_phase '
              'FROM trading.market_sessions ORDER BY updated_at DESC LIMIT 1'
          ));
          now = datetime.now(timezone.utc);
          healthy = False;
          if row is None:
              healthy = True;  # No session yet — skip health check
          elif row['market_phase'] in ('after_hours', 'idle'):
              healthy = True;  # After-hours/idle: heartbeat not expected
          elif row['last_heartbeat_at'] and (now - row['last_heartbeat_at']).total_seconds() < 120:
              healthy = True;  # Active session with recent heartbeat
          elif row['is_trading_day'] == False and row['checked_at'] and (now - row['checked_at']).total_seconds() < 86400:
              healthy = True;  # Non-trading day with recent check
          loop.run_until_complete(pool.close());
          exit(0 if healthy else 1)
          "
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - shared_net  # 추가됨

  # ---- Reconciliation Worker --------------------------------------------------
  # Long-lived worker that consumes reconciliation runs created by Phase 18/19.
  # Polls for runs with status='started', inquires broker for truth,
  # and transitions orders to authoritative states.
  reconciliation-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent_trading-app:latest
    container_name: agent_trading-reconciliation-worker
    command: ["python3", "/app/scripts/run_reconciliation_worker.py"]
    restart: unless-stopped
#    depends_on:
#      db:
#        condition: service_healthy
    environment:
      TZ: "Asia/Seoul"
      PYTHONPATH: "/app/src:/app/scripts"
      # DB — DATABASE_URL is used by worker for asyncpg direct connections
      DATABASE_URL: "postgresql://${DATABASE_USER:-trading}:${DATABASE_PASSWORD:-trading}@trading_db:5432/${DATABASE_NAME:-trading}"
      DATABASE_HOST: "trading_db"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "${DATABASE_NAME:-trading}"
      DATABASE_USER: "${DATABASE_USER:-trading}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-trading}"
      DATABASE_SCHEMA: "${DATABASE_SCHEMA:-trading}"
      # KIS env — preferred names (한국투자증권 actual standard)
      KIS_ENV: "${KIS_ENV:-paper}"
      KIS_APP_KEY: "${KIS_APP_KEY:-}"
      KIS_APP_SECRET: "${KIS_APP_SECRET:-}"
      KIS_ACCOUNT_NO: "${KIS_ACCOUNT_NO:-}"
      KIS_ACCOUNT_PRODUCT_CODE: "${KIS_ACCOUNT_PRODUCT_CODE:-01}"
      KIS_BASE_URL: "${KIS_BASE_URL:-}"
      KIS_WS_URL: "${KIS_WS_URL:-}"
      KIS_PAPER_REST_RPS: "${KIS_PAPER_REST_RPS:-1}"
      # Legacy fallback names (still supported)
      KIS_API_KEY: "${KIS_API_KEY:-}"
      KIS_API_SECRET: "${KIS_API_SECRET:-}"
      KIS_ACCOUNT_NUMBER: "${KIS_ACCOUNT_NUMBER:-}"
      KIS_DEV_TOKEN_CACHE_ENABLED: "${KIS_DEV_TOKEN_CACHE_ENABLED:-true}"
      KIS_DEV_TOKEN_CACHE_PATH: "${KIS_DEV_TOKEN_CACHE_PATH:-.cache/kis_token.json}"
      KIS_SHARED_BUDGET_FILE: "${KIS_SHARED_BUDGET_FILE:-.cache/kis_paper_global_budget.json}"
      # KIS Live Info (076/163)
      KIS_LIVE_INFO_ENABLED: "${KIS_LIVE_INFO_ENABLED:-false}"
      KIS_LIVE_INFO_APP_KEY: "${KIS_LIVE_INFO_APP_KEY}"
      KIS_LIVE_INFO_APP_SECRET: "${KIS_LIVE_INFO_APP_SECRET}"
      KIS_LIVE_INFO_BASE_URL: "${KIS_LIVE_INFO_BASE_URL}"
      KIS_LIVE_INFO_WS_URL: "${KIS_LIVE_INFO_WS_URL}"
      KIS_LIVE_TOKEN_CACHE_ENABLED: "${KIS_LIVE_TOKEN_CACHE_ENABLED:-true}"
      KIS_LIVE_TOKEN_CACHE_PATH: "${KIS_LIVE_TOKEN_CACHE_PATH:-.cache/kis_live_token.json}"
      # Worker Specific
      RECONCILIATION_WORKER_INTERVAL_SECONDS: "${RECONCILIATION_WORKER_INTERVAL_SECONDS:-30}"
      RECONCILIATION_WORKER_BATCH_SIZE: "${RECONCILIATION_WORKER_BATCH_SIZE:-10}"
    volumes:
      - ./scripts:/app/scripts
      - ./src:/app/src
      - ./.cache:/app/.cache
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    networks:
      - shared_net  # 추가됨

# 파일 최하단에 네트워크 추가
networks:
  shared_net:
    external: true
    name: trading_shared_net
